<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Invigilator System{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eef2f3, #dfe9f3);
    }

    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .btn { border-radius: 10px; }

    .badge {
      font-size: 0.85rem;
      border-radius: 8px;
    }

    .table th { font-weight: 600; }

    /* 🔄 LOADER */
    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.6);
      display: none; /* ✅ FIXED */
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    * { transition: all 0.2s ease; }

    .nav-link:hover {
      opacity: 0.8;
    }

    /* 🔥 Profile Button Clean Style */
    .profile-btn {
      background: transparent;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      color: #fff;
      transition: all 0.2s ease;
    }

    .profile-btn:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<!-- 🔄 LOADER -->
<div id="loader" class="loader-overlay">
  <div class="spinner-border text-primary"></div>
</div>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">

  <a class="navbar-brand fw-semibold" href="{% url 'dashboard' %}">Invigilator System</a>

  <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse justify-content-end" id="navMenu">

    {% if request.user.is_authenticated %}

      <ul class="navbar-nav align-items-center">

        <li class="nav-item">
          <a class="nav-link" href="{% url 'dashboard' %}">
            <i class="bi bi-speedometer2 me-1"></i> Dashboard
          </a>
        </li>

        <!-- 👤 PROFILE -->
        <li class="nav-item dropdown ms-3">
          <button class="profile-btn d-flex align-items-center" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 me-2"></i>
            <span class="small">{{ request.user.username }}</span>
            <i class="bi bi-caret-down-fill small"></i>
          </button>

          <ul class="dropdown-menu dropdown-menu-end shadow">
            <li class="px-3 py-2 text-muted small">
              Logged in as<br>
              <strong>{{ request.user.username }}</strong>
            </li>

            <li><hr></li>

            <li>
              <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                <i class="bi bi-box-arrow-right me-2"></i> Logout
              </a>
            </li>
          </ul>
        </li>

      </ul>

    {% else %}

      <div>
        <a href="{% url 'login' %}" class="btn btn-light me-2">Login</a>
        <a href="{% url 'register' %}" class="btn btn-outline-light">Register</a>
      </div>

    {% endif %}

  </div>
</nav>

<!-- 🔥 TOAST -->
{% if messages %}
<div class="toast-container position-fixed top-0 end-0 p-3">
  {% for message in messages %}
  <div class="toast show text-bg-primary mb-2">
    <div class="d-flex">
      <div class="toast-body">{{ message }}</div>
      <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}

<!-- 🔲 CONTENT -->
<div class="container py-4" style="max-width: 1100px;">
  {% block content %}{% endblock %}
</div>

<script>
window.onload = function () {
    const loader = document.getElementById("loader");
    if (loader) loader.style.display = "none";
};
</script>

<script>
setTimeout(() => {
  document.querySelectorAll('.toast').forEach(t => t.classList.remove('show'));
}, 3000);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
