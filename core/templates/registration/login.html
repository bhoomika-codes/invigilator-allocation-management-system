{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">

  <div class="card p-4 border-0" style="width: 420px; border-radius: 16px;">
    
    <h3 class="text-center mb-2 fw-bold">Login</h3>
    <h5 class="text-center fw-semibold mb-4 text-muted">Welcome Back !</h5>

    <form method="post" autocomplete="off">
      {% csrf_token %}

      <!-- 🔥 Disable autofill -->
      <input type="text" name="fakeuser" style="display:none">
      <input type="password" name="fakepass" style="display:none">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" autocomplete="off" required>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>

        <div class="input-group">
          <input type="password" name="password" id="loginPassword" class="form-control" required>

          <button type="button" class="btn btn-outline-secondary" onclick="toggleLoginPasswordIcon()">
            <i id="loginEyeIcon" class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i> Login
      </button>
    </form>

    <!-- Register Link -->
    <p class="text-center mt-3 mb-0 text-muted">
      Don't have an account? 
      <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Register</a>
    </p>

  </div>

</div>

{% endblock %}
